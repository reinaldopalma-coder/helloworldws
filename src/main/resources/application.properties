spring.application.name=HelloWorldWS
# Railway asigna un puerto dinamico de forma interna, esto le dice a Spring que lo escuche
server.port=${PORT:8080}

# Configuracion dinamica para la base de datos de Railway
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect