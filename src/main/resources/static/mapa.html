<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoreo - Interfaz Estructurada</title>
<link rel="stylesheet"
	href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
/* Estructura Base de la Pantalla */
body {
	margin: 0;
	padding: 0;
	font-family: 'Segoe UI', Arial, sans-serif;
	background-color: #f4f6f9;
	display: flex;
	height: 100vh;
	overflow: hidden;
}

/* 1. Panel Lateral Izquierdo (Controles e Información) */
.sidebar {
	width: 320px;
	background: white;
	box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
	display: flex;
	flex-direction: column;
	padding: 20px;
	box-sizing: border-box;
	border-right: 1px solid #e1e4e8;
}

.sidebar h2 {
	margin: 0 0 15px 0;
	font-size: 18px;
	color: #1e293b;
}

.status-box {
	background: #e0f2fe;
	color: #0369a1;
	padding: 10px 15px;
	border-radius: 6px;
	font-size: 13px;
	font-weight: 500;
	margin-bottom: 20px;
}

.device-section h3 {
	font-size: 14px;
	color: #64748b;
	margin-bottom: 10px;
	text-transform: uppercase;
	letter-spacing: 0.5px;
}

#deviceList ul {
	list-style: none;
	padding: 0;
	margin: 0;
}

#deviceList li {
	background: #f8fafc;
	padding: 10px 12px;
	border-radius: 6px;
	margin-bottom: 8px;
	border: 1px solid #edf2f7;
	font-size: 13px;
	color: #334155;
}

/* 2. Contenedor de la Derecha (Mapa y Línea de Tiempo) */
.main-content {
	flex: 1;
	display: flex;
	flex-direction: column;
	padding: 20px;
	box-sizing: border-box;
	gap: 20px;
}

/* Recuadro Central del Mapa */
.map-wrapper {
	flex: 1;
	background: white;
	border-radius: 12px;
	overflow: hidden;
	box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px
		rgba(0, 0, 0, 0.03);
	border: 1px solid #e2e8f0;
}

#map {
	height: 100%;
	width: 100%;
}

/* Contenedor Externo Inferior para la Línea de Tiempo */
.timeline-box {
	background: white;
	padding: 15px 20px;
	border-radius: 12px;
	box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
	border: 1px solid #e2e8f0;
	display: flex;
	flex-direction: column;
	gap: 10px;
}

.timeline-header {
	display: flex;
	justify-content: space-between;
	font-size: 13px;
	font-weight: 600;
	color: #1e293b;
}

.slider {
	-webkit-appearance: none;
	width: 100%;
	height: 6px;
	border-radius: 3px;
	background: #cbd5e1;
	outline: none;
	cursor: pointer;
}

.slider::-webkit-slider-thumb {
	-webkit-appearance: none;
	appearance: none;
	width: 16px;
	height: 16px;
	border-radius: 50%;
	background: #2563eb;
	cursor: pointer;
}

.slider::-webkit-slider-thumb:hover {
	background: #1d4ed8;
}

.time-labels {
	display: flex;
	justify-content: space-between;
	font-size: 11px;
	color: #64748b;
}
</style>
</head>
<body>

	<!-- Panel Lateral fuera del mapa -->
	<div class="sidebar">
		<h2>Panel de Control</h2>
		<div class="status-box" id="txtStatus">Inicializando...</div>

		<div class="device-section">
			<h3>Últimos Reportes</h3>
			<div id="deviceList"></div>
		</div>
	</div>

	<!-- Contenedor Principal Derecho -->
	<div class="main-content">

		<!-- Recuadro del Mapa en Medio -->
		<div class="map-wrapper">
			<div id="map"></div>
		</div>

		<!-- Línea de Tiempo Abajo fuera del mapa -->
		<div class="timeline-box" id="timelineUi" style="visibility: hidden;">
			<div class="timeline-header">
				<span>Historial de Navegación Temporal</span> <span
					id="currentTimeLabel" style="color: #2563eb;">Cargando
					marcas...</span>
			</div>
			<input type="range" min="0" max="100" value="100" class="slider"
				id="timeSlider" oninput="actualizarMapaPorSlider(this.value)">
			<div class="time-labels">
				<span id="startTimeLabel">-</span> <span id="endTimeLabel">-</span>
			</div>
		</div>

	</div>

	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<script>
        const map = L.map('map').setView([-38.749181, -72.629824667], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19, attribution: '© OpenStreetMap'
        }).addTo(map);

        let markersGroup = L.layerGroup().addTo(map);
        let todosLosLogs = [];
        let fechasUnicasOrdenadas = [];

        function inicializarTelemetria() {
            document.getElementById('txtStatus').innerText = "Conectando con la API...";
            
            fetch('/api/logGanado')
                .then(response => response.json())
                .then(data => {
                    if (data.length === 0) {
                        document.getElementById('txtStatus').innerText = "Sin datos en MySQL.";
                        return;
                    }

                    todosLosLogs = data.sort((a, b) => new Date(a.fechaCreacion) - new Date(b.fechaCreacion));
                    fechasUnicasOrdenadas = todosLosLogs.map(log => log.fechaCreacion);

                    const slider = document.getElementById('timeSlider');
                    slider.min = 0;
                    slider.max = fechasUnicasOrdenadas.length - 1;
                    slider.value = fechasUnicasOrdenadas.length - 1;

                    document.getElementById('startTimeLabel').innerText = new Date(fechasUnicasOrdenadas[0]).toLocaleString();
                    document.getElementById('endTimeLabel').innerText = new Date(fechasUnicasOrdenadas[fechasUnicasOrdenadas.length - 1]).toLocaleString();
                    
                    document.getElementById('timelineUi').style.visibility = 'visible';
                    renderizarMapaEnInstante(fechasUnicasOrdenadas.length - 1);
                })
                .catch(error => {
                    console.error("Error:", error);
                    document.getElementById('txtStatus').innerText = "Error al leer servidor.";
                });
        }

        function actualizarMapaPorSlider(index) {
            renderizarMapaEnInstante(parseInt(index));
        }

        function renderizarMapaEnInstante(indexSlider) {
            markersGroup.clearLayers();

            const fechaCorteStr = fechasUnicasOrdenadas[indexSlider];
            const fechaCorte = new Date(fechaCorteStr);

            const esUltimo = (indexSlider === fechasUnicasOrdenadas.length - 1);
            document.getElementById('currentTimeLabel').innerText = esUltimo 
                ? `Actual: ${fechaCorte.toLocaleString()}`
                : `Histórico: ${fechaCorte.toLocaleString()}`;

            const logsHastaElMomento = todosLosLogs.filter(log => new Date(log.fechaCreacion) <= fechaCorte);
            const ultimasPosicionesDispositivos = {};

            logsHastaElMomento.forEach(log => {
                ultimasPosicionesDispositivos[log.dispositivoId] = log;
            });

            const listaDispositivos = Object.values(ultimasPosicionesDispositivos);
            
            <!-- Si hay dispositivos, centra el mapa automáticamente en el primero de la lista con zoom 18 -->
            if (listaDispositivos.length > 0) {
                map.setView([listaDispositivos[0].latitud, listaDispositivos[0].longitud], 18);
            }
            
            listaDispositivos.forEach(log => {
                const marker = L.marker([log.latitud, log.longitud]);
                marker.bindPopup(`
                    <b>Dispositivo ID:</b> ${log.dispositivoId}<br>
                    <b>Temperatura:</b> ${log.temperatura} °C<br>
                    <b>Reporte:</b> ${new Date(log.fechaCreacion).toLocaleString()}
                `);
                markersGroup.addLayer(marker);
            });

            document.getElementById('txtStatus').innerText = `${listaDispositivos.length} en línea`;
            
            let htmlLista = "<ul>";
            listaDispositivos.forEach(d => {
                htmlLista += `<li><b>ID: ${d.dispositivoId}</b><br>🌡️ Temp: ${d.temperatura}°C</li>`;
            });
            htmlLista += "</ul>";
            document.getElementById('deviceList').innerHTML = htmlLista;
        }

        inicializarTelemetria();
    </script>
</body>
</html>
