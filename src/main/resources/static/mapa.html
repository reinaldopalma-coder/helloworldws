<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo - Interfaz Modo Oscuro</title>
    
    <!-- 1. Estilos de Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- 2. Tus Estilos Propios Separados -->
    <link rel="stylesheet" href="/css/estilos.css" />
</head>
<body>

    <!-- Panel Lateral Oscuro -->
    <div class="sidebar">
        <h2>Panel de Control</h2>
        <div class="status-box" id="txtStatus">Inicializando...</div>
        
        <div class="device-section">
            <h3>Últimos Reportes</h3>
            <div id="deviceList"></div>
        </div>
    </div>

    <!-- Contenedor Principal Derecho -->
    <div class="main-content">
        <!-- Recuadro del Mapa Centrado -->
        <div class="map-wrapper">
            <div id="map"></div>
        </div>

        <!-- Línea de Tiempo Inferior -->
        <div class="timeline-box" id="timelineUi" style="visibility: hidden;">
            <div class="timeline-header">
                <span>Historial de Navegación Temporal</span>
                <span id="currentTimeLabel" style="color: #38bdf8;">Cargando marcas...</span>
            </div>
            <input type="range" min="0" max="100" value="100" class="slider" id="timeSlider" oninput="actualizarMapaPorSlider(this.value)">
            <div class="time-labels">
                <span id="startTimeLabel">-</span>
                <span id="endTimeLabel">-</span>
            </div>
        </div>
    </div>

    <!-- 3. Librería JS de Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 4. Tu Lógica de JavaScript Separada -->
    <script src="/js/monitoreo.js"></script>
</body>
</html>
